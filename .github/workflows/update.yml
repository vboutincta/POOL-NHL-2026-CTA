name: Update NHL Scores

on:
  schedule:
    - cron: '0 7 * * *'  # 3h AM EDT (UTC-4, donc 7h UTC)
  workflow_dispatch:      # Permet aussi un déclenchement manuel depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Update NHL scores
        run: python update_scores.py

      - name: Commit & push si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🏒 Scores NHL $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
